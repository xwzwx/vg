    <style>
        /* === 1. BASE SETUP === */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            /* Locks the page perfectly so no outer scrollbars ever appear */
            overflow: hidden; 
            font-family: Arial, sans-serif;
            background-color: #cdeaf5; 
        }

        /* === 2. IFRAME CONTAINER === */
        .iframe-wrapper {
            position: relative; 
            width: 100%;
            height: 100%;
        }

        iframe {
            border: 0;
            width: 100%;
            height: 100%;
        }

        /* === 3. DESKTOP SHIELD (Larger than 900px) === */
        .footer-blocker {
            position: absolute;
            bottom: 0; 
            left: 0;
            width: 100%; 
            
            /* EXPANDED HEIGHT: Increased by exactly 30px (from 95px to 125px) */
            height: 125px; 
            
            z-index: 50; 
            background-color: #cdeaf5; 
            pointer-events: none; 
        }

        /* === 4. TABLET SHIELD (Text wraps to 2 lines) === */
        @media screen and (max-width: 900px) {
            .footer-blocker {
                /* REVERTED: Back to original 130px */
                height: 130px; 
            }
        }

        /* === 5. MOBILE SHIELD (Text wraps to 3 lines) === */
        @media screen and (max-width: 600px) {
            .footer-blocker {
                /* REVERTED: Back to original 170px */
                height: 170px; 
            }
        }
    </style>
</head>
